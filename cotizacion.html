<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Cotización · Focus Store</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f5f7fa; color: #1a2035; min-height: 100vh; }

  .topbar { background: #0d1530; padding: 14px 24px; display: flex; align-items: center; gap: 14px; }
  .topbar img { height: 36px; }
  .topbar-brand { color: #fff; font-weight: 800; font-size: 17px; letter-spacing: .3px; }
  .topbar-sub { color: #8892aa; font-size: 12px; margin-top: 1px; }

  .container { max-width: 860px; margin: 32px auto; padding: 0 16px 48px; }

  .cot-card { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.08); overflow: hidden; }

  /* Header de la cotización */
  .cot-header { background: linear-gradient(135deg, #0d1530 0%, #1a2a5e 100%); padding: 32px 36px; display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 20px; }
  .cot-numero { color: #fff; font-size: 28px; font-weight: 800; letter-spacing: .5px; }
  .cot-fecha-wrap { text-align: right; }
  .cot-fecha-label { color: #8892aa; font-size: 11px; text-transform: uppercase; letter-spacing: .8px; }
  .cot-fecha-val { color: #fff; font-size: 14px; font-weight: 600; margin-top: 2px; }

  .badge-estado { display: inline-block; padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-top: 10px; }
  .badge-activa    { background: rgba(0,200,160,.2); color: #00c8a0; border: 1px solid rgba(0,200,160,.4); }
  .badge-vencida   { background: rgba(255,71,87,.15); color: #ff4757; border: 1px solid rgba(255,71,87,.3); }
  .badge-convertida{ background: rgba(61,106,255,.15); color: #3d6aff; border: 1px solid rgba(61,106,255,.3); }

  /* Info cliente/vendedor */
  .cot-info { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border-bottom: 1px solid #eef0f5; }
  .cot-info-box { padding: 24px 36px; }
  .cot-info-box:first-child { border-right: 1px solid #eef0f5; }
  .info-label { font-size: 11px; text-transform: uppercase; letter-spacing: .8px; color: #8892aa; font-weight: 700; margin-bottom: 10px; }
  .info-nombre { font-size: 17px; font-weight: 700; color: #1a2035; margin-bottom: 6px; }
  .info-line { font-size: 13px; color: #5a6785; margin-top: 4px; display: flex; align-items: center; gap: 6px; }

  /* Tabla de productos */
  .cot-items { padding: 28px 36px; }
  .items-title { font-size: 13px; font-weight: 700; color: #8892aa; text-transform: uppercase; letter-spacing: .6px; margin-bottom: 16px; }
  table { width: 100%; border-collapse: collapse; }
  thead th { padding: 10px 12px; text-align: left; font-size: 11px; font-weight: 700; color: #8892aa; text-transform: uppercase; letter-spacing: .6px; border-bottom: 2px solid #eef0f5; }
  thead th:last-child, thead th:nth-last-child(2), thead th:nth-last-child(3) { text-align: right; }
  tbody td { padding: 14px 12px; border-bottom: 1px solid #f0f2f8; font-size: 14px; vertical-align: middle; }
  tbody td:last-child, tbody td:nth-last-child(2), tbody td:nth-last-child(3) { text-align: right; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: #f9fafc; }
  .td-prod { font-weight: 600; color: #1a2035; }
  .td-sku { font-size: 11px; color: #8892aa; font-family: monospace; margin-top: 3px; }
  .td-cant { font-weight: 700; color: #3d6aff; }
  .td-price { font-weight: 600; color: #1a2035; font-family: monospace; }
  .td-sub { font-weight: 700; color: #1a2035; font-family: monospace; }
  .isv-badge { display: inline-block; background: #eef0f5; color: #5a6785; font-size: 10px; padding: 1px 5px; border-radius: 4px; margin-left: 4px; }

  /* Totales */
  .cot-totales { padding: 20px 36px 28px; background: #f9fafc; border-top: 2px solid #eef0f5; }
  .total-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; font-size: 14px; color: #5a6785; }
  .total-row.desc { color: #e8405a; }
  .total-row.final { border-top: 2px solid #eef0f5; margin-top: 8px; padding-top: 14px; }
  .total-row.final .tl { font-size: 17px; font-weight: 800; color: #1a2035; }
  .total-row.final .tv { font-size: 22px; font-weight: 800; color: #0d6efd; }
  .total-inner { max-width: 320px; margin-left: auto; }

  /* Observaciones */
  .cot-obs { padding: 20px 36px; border-top: 1px solid #eef0f5; }
  .obs-title { font-size: 11px; font-weight: 700; color: #8892aa; text-transform: uppercase; letter-spacing: .6px; margin-bottom: 8px; }
  .obs-text { font-size: 14px; color: #5a6785; line-height: 1.6; white-space: pre-line; }

  /* Vencimiento alert */
  .cot-validez { padding: 16px 36px; background: #fffbf0; border-top: 1px solid #fde68a; display: flex; align-items: center; gap: 10px; }
  .cot-validez.vencida { background: #fff5f5; border-top-color: #fecaca; }
  .validez-text { font-size: 13px; color: #92400e; }
  .validez-text.vencida { color: #dc2626; }

  /* Footer */
  .cot-footer { padding: 24px 36px; border-top: 1px solid #eef0f5; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; background: #fff; }
  .footer-brand { font-weight: 700; color: #0d1530; font-size: 14px; }
  .footer-contact { font-size: 12px; color: #8892aa; }
  .btn-accion { display: inline-flex; align-items: center; gap: 8px; padding: 11px 22px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; border: none; text-decoration: none; transition: all .2s; }
  .btn-wapp { background: #25d366; color: #fff; }
  .btn-wapp:hover { background: #1ebe5d; }
  .btn-print { background: #eef0f5; color: #1a2035; margin-left: 8px; }
  .btn-print:hover { background: #e2e5ef; }

  /* Loading / Error */
  .estado-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 24px; text-align: center; }
  .estado-icon { font-size: 52px; margin-bottom: 16px; }
  .estado-titulo { font-size: 20px; font-weight: 700; color: #1a2035; margin-bottom: 8px; }
  .estado-sub { font-size: 14px; color: #8892aa; }
  .spinner { width: 40px; height: 40px; border: 4px solid #eef0f5; border-top-color: #3d6aff; border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    .cot-header { padding: 24px 20px; }
    .cot-info { grid-template-columns: 1fr; }
    .cot-info-box:first-child { border-right: none; border-bottom: 1px solid #eef0f5; }
    .cot-info-box { padding: 18px 20px; }
    .cot-items, .cot-totales, .cot-obs, .cot-footer, .cot-validez { padding-left: 20px; padding-right: 20px; }
    .cot-numero { font-size: 22px; }
    thead th:nth-child(3), tbody td:nth-child(3) { display: none; }
  }
  @media print {
    body { background: #fff; }
    .topbar { display: none; }
    .btn-accion { display: none; }
    .container { margin: 0; padding: 0; max-width: 100%; }
    .cot-card { box-shadow: none; border-radius: 0; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-brand">📦 Focus Store</div>
    <div class="topbar-sub">focusstore.net</div>
  </div>
</div>

<div class="container">
  <div class="cot-card" id="cotCard">
    <div class="estado-wrap" id="loadingEl">
      <div class="spinner"></div>
      <div class="estado-titulo">Cargando cotización...</div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://eqvzzfzydzrgwseirtmu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxdnp6Znp5ZHpyZ3dzZWlydG11Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyOTY2MDAsImV4cCI6MjA5ODg3MjYwMH0.oitPJ2-jEdwin84wbzb6l0iN0XSpJi-FSsEY-gMqpDU';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function fmtLPS(n) {
  if (n == null || isNaN(n)) return 'L 0.00';
  return 'L ' + parseFloat(n).toLocaleString('es-HN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtFecha(d) {
  if (!d) return '—';
  const [y,m,day] = d.split('-');
  const meses = ['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return `${parseInt(day)} ${meses[parseInt(m)]} ${y}`;
}
function diasRestantes(fechaStr) {
  if (!fechaStr) return null;
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const fv = new Date(fechaStr + 'T00:00:00');
  return Math.round((fv - hoy) / 86400000);
}

async function cargar() {
  const params = new URLSearchParams(location.search);
  const token = params.get('t') || params.get('id') || params.get('numero') || '';
  const card = document.getElementById('cotCard');

  if (!token) {
    card.innerHTML = `<div class="estado-wrap"><div class="estado-icon">🔍</div><div class="estado-titulo">Link inválido</div><div class="estado-sub">El link no es válido. Solicita uno nuevo a Focus Store.</div></div>`;
    return;
  }

  const { data, error } = await sb.rpc('get_cotizacion_publica', { p_token: token });
  if (error) {
    card.innerHTML = `<div class="estado-wrap"><div class="estado-icon">⚠️</div><div class="estado-titulo">Error al cargar</div><div class="estado-sub" style="font-family:monospace;font-size:11px">${JSON.stringify(error)}</div></div>`;
    return;
  }
  if (!data || !data.length) {
    card.innerHTML = `<div class="estado-wrap"><div class="estado-icon">😕</div><div class="estado-titulo">No se encontró la cotización</div><div class="estado-sub">El link puede haber expirado o no es válido.</div></div>`;
    return;
  }

  const c = data[0];
  const dias = diasRestantes(c.fecha_vencimiento);
  const vencida = dias !== null && dias < 0;
  const est = (c.estado || '').toLowerCase();
  const estadoBadge = est === 'activa' && !vencida ? '<span class="badge-estado badge-activa">✅ Activa</span>'
    : est === 'convertida' ? '<span class="badge-estado badge-convertida">🎉 Convertida en Venta</span>'
    : est === 'rechazada' ? '<span class="badge-estado badge-vencida">❌ Rechazada</span>'
    : vencida ? '<span class="badge-estado badge-vencida">⛔ Vencida</span>'
    : '<span class="badge-estado badge-activa">✅ Activa</span>';

  const items = (c.items || []);
  const descValor = parseFloat(c.descuento_valor || 0);
  const tieneDesc = descValor > 0;

  // Validez banner
  let validezHtml = '';
  if (c.fecha_vencimiento) {
    if (vencida) {
      validezHtml = `<div class="cot-validez vencida"><span>⛔</span><span class="validez-text vencida">Esta cotización venció el <strong>${fmtFecha(c.fecha_vencimiento)}</strong>. Contáctanos para una cotización actualizada.</span></div>`;
    } else if (dias <= 3) {
      validezHtml = `<div class="cot-validez"><span>⚠️</span><span class="validez-text">Esta cotización vence en <strong>${dias === 0 ? 'hoy' : dias + ' día(s)'}</strong> — ${fmtFecha(c.fecha_vencimiento)}. ¡Apresúrate!</span></div>`;
    } else {
      validezHtml = `<div class="cot-validez"><span>📅</span><span class="validez-text">Válida hasta el <strong>${fmtFecha(c.fecha_vencimiento)}</strong> (${dias} días restantes).</span></div>`;
    }
  }

  // WhatsApp del vendedor (para que cliente contacte)
  const telCliente = (c.cliente_tel || '').replace(/\D/g, '');
  const wappUrl = telCliente ? `https://wa.me/504${telCliente}?text=${encodeURIComponent('Hola, me interesa la cotización ' + c.numero + ' de Focus Store. ¿Podemos proceder?')}` : null;

  card.innerHTML = `
    <!-- HEADER -->
    <div class="cot-header">
      <div>
        <div class="cot-numero">${c.numero}</div>
        ${estadoBadge}
      </div>
      <div class="cot-fecha-wrap">
        <div class="cot-fecha-label">Fecha de emisión</div>
        <div class="cot-fecha-val">${fmtFecha(c.fecha)}</div>
        ${c.fecha_vencimiento ? `<div class="cot-fecha-label" style="margin-top:10px">Válida hasta</div><div class="cot-fecha-val">${fmtFecha(c.fecha_vencimiento)}</div>` : ''}
      </div>
    </div>

    <!-- INFO CLIENTE / VENDEDOR -->
    <div class="cot-info">
      <div class="cot-info-box">
        <div class="info-label">📋 Cliente</div>
        <div class="info-nombre">${c.cliente_nombre || '—'}</div>
        ${c.cliente_rtn   ? `<div class="info-line">🪪 RTN: ${c.cliente_rtn}</div>` : ''}
        ${c.cliente_ciudad? `<div class="info-line">🏙️ ${c.cliente_ciudad}</div>` : ''}
        ${c.cliente_tel   ? `<div class="info-line">📞 ${c.cliente_tel}</div>` : ''}
        ${c.cliente_email ? `<div class="info-line">✉️ ${c.cliente_email}</div>` : ''}
      </div>
      <div class="cot-info-box">
        <div class="info-label">🏬 Focus Store</div>
        <div class="info-nombre">Focus Store Honduras</div>
        <div class="info-line">👤 Asesor: ${c.vendedor_nombre || '—'}</div>
        <div class="info-line">🌐 focusstore.net</div>
        <div class="info-line">📞 +504 3287-6364</div>
      </div>
    </div>

    ${validezHtml}

    <!-- PRODUCTOS -->
    <div class="cot-items">
      <div class="items-title">🛒 Productos cotizados</div>
      <table>
        <thead>
          <tr>
            <th style="width:40%">Producto</th>
            <th style="text-align:center">ISV</th>
            <th style="text-align:center">Cant.</th>
            <th style="text-align:right">P. Unit. sin ISV</th>
            <th style="text-align:right;color:#e8405a">Desc.</th>
            <th style="text-align:right">Total sin ISV</th>
          </tr>
        </thead>
        <tbody>
          ${items.map(it => {
            const precioConIsv = parseFloat(it.precio_final || it.precioUnitario || it.precio_unitario || it.precio || 0);
            const listaConIsv  = parseFloat(it.precio_lista || precioConIsv);
            const isv          = it.lleva_isv || it.isv || it.aplicaISV || false;
            const isvPct       = parseFloat(it.isv_pct || (isv ? 0.15 : 0));
            const divisor      = 1 + isvPct;
            // Precios SIN ISV (como el PDF)
            const precioSinIsv = precioConIsv / divisor;
            const listaSinIsv  = listaConIsv  / divisor;
            const cant         = parseInt(it.cantidad || 1);
            const subSinIsv    = precioSinIsv * cant;
            const descItem     = listaSinIsv > precioSinIsv ? (listaSinIsv - precioSinIsv) * cant : 0;
            const nombre       = it.nombre || it.producto || '—';
            const img          = it.imagen || it.image || '';
            const nota         = it.nota_item || it.notaItem || '';
            return `<tr>
              <td>
                <div style="display:flex;align-items:center;gap:12px">
                  ${img ? `<img src="${img}" alt="" style="width:52px;height:52px;object-fit:contain;border-radius:8px;border:1px solid #eef0f5;flex-shrink:0;background:#f9fafc">` : ''}
                  <div>
                    <div class="td-prod">${nombre}</div>
                    ${it.sku ? `<div class="td-sku">SKU: ${it.sku}</div>` : ''}
                    ${nota ? `<div style="font-size:11px;color:#5a6785;margin-top:3px;font-style:italic">📝 ${nota}</div>` : ''}
                  </div>
                </div>
              </td>
              <td style="text-align:center">${isv ? '<span class="isv-badge">+15%</span>' : '<span style="color:#8892aa;font-size:12px">—</span>'}</td>
              <td class="td-cant" style="text-align:center">${cant}</td>
              <td class="td-price">${fmtLPS(listaSinIsv)}</td>
              <td style="text-align:right;color:#e8405a;font-weight:600">${descItem > 0.009 ? '- ' + fmtLPS(descItem) : '<span style="color:#ccc">—</span>'}</td>
              <td class="td-sub">${fmtLPS(subSinIsv)}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>

    <!-- TOTALES -->
    <div class="cot-totales">
      <div class="total-inner">
        ${(() => {
          const gravable   = parseFloat(c.total_isv) > 0 ? parseFloat(c.total_isv) / 0.15 : 0;
          const noGravable = Math.max(0, parseFloat(c.subtotal_sin_isv) - gravable);
          return `
            <div class="total-row"><span>Subtotal sin ISV</span><span>${fmtLPS(c.subtotal_sin_isv)}</span></div>
            ${gravable > 0 ? `<div class="total-row" style="padding-left:14px;color:#8892aa;font-size:13px"><span>↳ Importe Gravado 15%</span><span>${fmtLPS(gravable)}</span></div>` : ''}
            ${noGravable > 0.01 ? `<div class="total-row" style="padding-left:14px;color:#8892aa;font-size:13px"><span>↳ Importe No Gravado</span><span>${fmtLPS(noGravable)}</span></div>` : ''}
            <div class="total-row"><span>ISV (15%)</span><span>${fmtLPS(c.total_isv)}</span></div>
          `;
        })()}
        ${tieneDesc ? `<div class="total-row desc"><span>Descuento ${c.descuento_tipo === 'pct' ? '(' + parseFloat(c.descuento || 0).toFixed(1) + '%)' : ''}</span><span>- ${fmtLPS(descValor)}</span></div>` : ''}
        <div class="total-row final"><span class="tl">TOTAL</span><span class="tv">${fmtLPS(c.total)}</span></div>
        ${(() => {
          const ahorroTotal = items.reduce((acc, it) => {
            const isvPct   = parseFloat(it.isv_pct || (it.lleva_isv ? 0.15 : 0));
            const divisor  = 1 + isvPct;
            const lista    = parseFloat(it.precio_lista || it.precio_final || 0) / divisor;
            const final    = parseFloat(it.precio_final || 0) / divisor;
            return acc + (lista > final ? (lista - final) * parseInt(it.cantidad || 1) : 0);
          }, 0);
          return ahorroTotal > 0 ? `<div style="margin-top:10px;padding:10px 12px;background:rgba(0,200,160,.08);border:1px solid rgba(0,200,160,.25);border-radius:8px;display:flex;justify-content:space-between;align-items:center">
            <span style="font-size:13px;color:#00a880;font-weight:600">🎉 Ahorro total del cliente</span>
            <span style="font-size:15px;font-weight:800;color:#00a880">${fmtLPS(ahorroTotal)}</span>
          </div>` : '';
        })()}
      </div>
    </div>

    ${c.observaciones ? `<div class="cot-obs"><div class="obs-title">📝 Observaciones</div><div class="obs-text">${c.observaciones}</div></div>` : ''}

    <!-- FIRMA Y SELLO -->
    ${c.firma_url ? `
    <div style="padding:24px 36px;border-top:1px solid #eef0f5;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:20px">
      <div style="text-align:center;min-width:180px">
        <img src="${c.firma_url}" alt="Firma y Sello" style="max-height:80px;max-width:200px;object-fit:contain;margin-bottom:8px">
        <div style="border-top:1px solid #ccc;padding-top:6px;font-size:11px;color:#8892aa;font-weight:600">Firma y Sello · FOCUS STORE</div>
      </div>
      <div style="text-align:center;min-width:180px">
        <div style="height:80px;display:flex;align-items:flex-end;justify-content:center">
          <div style="width:200px;border-bottom:1px solid #ccc"></div>
        </div>
        <div style="padding-top:6px;font-size:11px;color:#8892aa;font-weight:600">Aceptado por · ${c.cliente_nombre||'Cliente'}</div>
      </div>
    </div>` : ''}

    <!-- FOOTER ACCIONES -->
    <div class="cot-footer">
      <div>
        <div class="footer-brand">📦 Focus Store Honduras</div>
        <div class="footer-contact">focusstore.net · +504 3287-6364</div>
      </div>
